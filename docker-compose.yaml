services:
  db:
    image: mysql:8.0
    container_name: eventmap_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    environment:
      MYSQL_DATABASE: TFG
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./EventMap_Al-Andalus # Empieza desde la raíz del repo
      dockerfile: backend/Dockerfile # Ruta al archivo que me has pasado
    container_name: eventmap_backend
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/TFG?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    ports:
      - "8081:8081"

  frontend:
    image: nginx:alpine
    container_name: eventmap_frontend
    ports:
      - "80:80"
    volumes:
      # Asegúrate de que esta ruta existe en el VPS tras el git pull
      - ./EventMap_Al-Andalus/frontend/dist-nueva/eventmap-frontend/browser:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mysql_data: