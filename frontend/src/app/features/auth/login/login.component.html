<div class="auth-container">
  <h2>Iniciar Sesión</h2>

  @if (errorMessage) {
  <div class="error-alert">
    {{ errorMessage }}
  </div>
  }

  <form (ngSubmit)="login()">
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="credentials.email" name="email" placeholder="Introduce tu email" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="credentials.password" name="password" placeholder="Tu contraseña" required>
    </div>
    <button type="submit">Entrar</button>
  </form>
  <a href="/register">¿No tienes cuenta? Regístrate aquí</a>
</div>
