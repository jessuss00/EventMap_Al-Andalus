<header class="header">
  <a [routerLink]="getHomeRoute()" class="logo-container">
    <img src="/logo.png" alt="EventMap Logo" class="logo-image">
    <span class="logo-text">EventMap</span>
  </a>

  <div class="header-right">
    <!-- Search Bar -->
    <div class="search-container" *ngIf="isLoggedIn$ | async" [class.expanded]="isSearchExpanded">
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon" (click)="toggleSearch()"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input 
          type="text" 
          placeholder="Buscar eventos..." 
          [(ngModel)]="searchText" 
          (ngModelChange)="onSearchChange()"
          (blur)="searchText === '' ? isSearchExpanded = false : null"
          class="search-input">

      </div>
    </div>

    <!-- Hamburger Menu Button -->
    <button class="mobile-menu-toggle" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen">
      <div class="hamburger-inner"></div>
    </button>

    <nav class="nav-links" [class.mobile-open]="isMobileMenuOpen">
      <a [routerLink]="getHomeRoute()" class="nav-link" (click)="isMobileMenuOpen = false">Inicio</a>
      
      <ng-container *ngIf="(isLoggedIn$ | async) === false">
        <a routerLink="/login" class="btn-login" (click)="isMobileMenuOpen = false">Iniciar Sesión</a>
        <a routerLink="/register" class="btn-register" (click)="isMobileMenuOpen = false">Registrarse</a>
      </ng-container>

      <ng-container *ngIf="isLoggedIn$ | async">
        <div class="user-menu-container">
          <div class="user-profile" title="Mi Perfil" (click)="toggleDropdown()">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="profile-icon">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          
          <div class="dropdown-menu" *ngIf="isDropdownOpen">
            <a class="dropdown-item" (click)="editProfile()">Editar Perfil</a>
            <a class="dropdown-item logout-item" (click)="logout()">Cerrar Sesión</a>
          </div>
        </div>
      </ng-container>
    </nav>
  </div>
</header>
