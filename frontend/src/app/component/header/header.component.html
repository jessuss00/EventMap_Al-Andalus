<header class="header">
  <a href="/" class="logo-container">
    <div class="logo-icon">E</div>
    <span class="logo-text">EventMap</span>
  </a>

  <nav class="nav-links">
    <a href="/" class="nav-link">Inicio</a>
    
    <ng-container *ngIf="!isLoggedIn()">
      <a href="/login" class="btn-login">Iniciar Sesión</a>
      <a href="/register" class="btn-register">Registrarse</a>
    </ng-container>

    <ng-container *ngIf="isLoggedIn()">
      <div class="user-profile" title="Mi Perfil">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="profile-icon">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
    </ng-container>
  </nav>
</header>
