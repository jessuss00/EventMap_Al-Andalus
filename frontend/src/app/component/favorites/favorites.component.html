<div class="favorites-container">
  <div class="favorites-header">
    <div class="header-content">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#FFD700" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="star-icon">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
      <h1>Mis Eventos Favoritos</h1>
    </div>
    <p class="subtitle">Guarda y gestiona los eventos que no te quieres perder.</p>
  </div>

  <div *ngIf="loading" class="loader-container">
    <div class="loader"></div>
    <p>Cargando tus favoritos...</p>
  </div>

  <div *ngIf="!loading && favoritos.length === 0" class="no-favorites">
    <div class="empty-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
    </div>
    <h3>Parece que no tienes favoritos aún</h3>
    <p>Explora los eventos y marca los que más te gusten.</p>
    <button class="btn-discover" routerLink="/home">Descubrir Eventos</button>
  </div>

  <div class="favorites-grid" *ngIf="!loading && favoritos.length > 0">
    <div class="favorite-card" *ngFor="let fav of favoritos">
      <div class="fav-image">
        <img [src]="fav.imagen" (error)="fav.imagen = 'https://picsum.photos/400/300?random=' + fav.id" alt="{{ fav.nombre }}">
        <div class="fav-badge">{{ fav.tipo }}</div>
      </div>
      <div class="fav-content">
        <h4>{{ fav.nombre }}</h4>
        <div class="fav-location" *ngIf="fav.municipio">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          {{ fav.municipio.nombre }}
        </div>
        <div class="fav-actions">
          <button class="btn-view" [routerLink]="['/event', fav.id]">Ver Detalles</button>
          <button class="btn-remove" (click)="quitarFavorito(fav.id)" title="Quitar de favoritos">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"></path>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
