<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <h2>Mi Perfil</h2>
      <p class="subtitle">Gestiona tu información personal en EventMap</p>
    </div>

    <div *ngIf="loading" class="loader-container">
      <div class="loader"></div>
      <p>Cargando tus datos...</p>
    </div>

    <div *ngIf="!loading" class="form-container">
      <div *ngIf="successMessage" class="alert alert-success">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert alert-danger">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <div class="input-wrapper">
              <input type="text" id="nombre" formControlName="nombre" placeholder="Tu nombre">
            </div>
          </div>
          <div class="form-group">
            <label for="apellidos">Apellidos</label>
            <div class="input-wrapper">
              <input type="text" id="apellidos" formControlName="apellidos" placeholder="Tus apellidos">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <input type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edad">Edad</label>
            <div class="input-wrapper">
              <input type="number" id="edad" formControlName="edad" placeholder="Edad">
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" [disabled]="profileForm.invalid || loading" class="btn-save">
            <span>Guardar Cambios</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
